name: Daily AI Topics
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  run-ai-topics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python3 scripts/ai_topics_cron.py
